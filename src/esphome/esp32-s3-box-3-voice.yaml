packages:
  clock_params: !include clock-params.yaml

substitutions:
  name: esp32-s3-box-3-voice
  friendly_name: ESP32-S3-BOX-3 Voice
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  api_encryption_key: !secret api_encryption_key
  ota_password: !secret ota_password

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: "Lean Home Assistant Assist satellite for ESP32-S3-BOX-3"
  on_boot:
    priority: -10
    then:
      - light.turn_on:
          id: lcd_backlight
          brightness: 80%
      - speaker.volume_set:
          id: box_speaker
          volume: !lambda "return id(volume_level).state / 100.0f;"
      - if:
          condition:
            switch.is_on: mute_switch
          then:
            - speaker.mute_on: box_speaker
          else:
            - speaker.mute_off: box_speaker
      - script.execute: ui_idle

esp32:
  variant: esp32s3
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

# BOX-3 benefits from PSRAM for audio buffering, LVGL, and optional on-device
# wake word. If your hardware revision differs, verify the PSRAM mode.
psram:
  mode: octal
  speed: 80MHz

# Minimal-overhead logging for fastest response and lower serial noise.
logger:
  level: WARN
  baud_rate: 0

api:
  encryption:
    key: ${api_encryption_key}
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: ${ota_password}

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  power_save_mode: none
  fast_connect: true

# No fallback AP and no captive portal by design.

time:
  - platform: homeassistant
    id: ha_time

# BOX-3-specific pin assumptions. Verify these if your exact board revision
# fails to initialize the display or audio codecs.
i2c:
  - id: bus_audio
    sda: GPIO8
    scl: GPIO18
    frequency: 400kHz
    scan: false

spi:
  - id: lcd_spi
    clk_pin: GPIO7
    mosi_pin: GPIO6

i2s_audio:
  - id: box_i2s
    i2s_lrclk_pin: GPIO45
    i2s_bclk_pin: GPIO17
    i2s_mclk_pin: GPIO2

audio_adc:
  - platform: es7210
    id: box_adc
    i2c_id: bus_audio
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    id: box_dac
    i2c_id: bus_audio
    bits_per_sample: 16bit
    sample_rate: 16000
    use_mclk: true

microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_audio_id: box_i2s
    adc_type: external
    i2s_din_pin: GPIO16
    bits_per_sample: 16bit
    sample_rate: 16000
    channel: right
    correct_dc_offset: true

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_audio_id: box_i2s
    audio_dac: box_dac
    dac_type: external
    i2s_dout_pin: GPIO15
    bits_per_sample: 16bit
    sample_rate: 16000
    channel: mono
    # Short buffer helps perceived response time while remaining stable.
    buffer_duration: 120ms
    timeout: 100ms

switch:
  - platform: gpio
    id: speaker_amp_power
    internal: true
    restore_mode: ALWAYS_ON
    pin: GPIO46

  - platform: template
    id: mute_switch
    name: "${friendly_name} Mute"
    entity_category: config
    icon: mdi:microphone-off
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - micro_wake_word.stop:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
      - speaker.mute_on: box_speaker
      - script.execute: ui_idle
    turn_off_action:
      - speaker.mute_off: box_speaker
      - script.execute: arm_wake_word

number:
  - platform: template
    id: volume_level
    name: "${friendly_name} Volume"
    entity_category: config
    icon: mdi:volume-high
    optimistic: true
    restore_value: true
    initial_value: 65
    min_value: 0
    max_value: 100
    step: 5
    set_action:
      - speaker.volume_set:
          id: box_speaker
          volume: !lambda "return x / 100.0f;"

button:
  - platform: restart
    name: "${friendly_name} Restart"
    entity_category: config

# Expected asset:
# - Put a transparent PNG at assets/voice_pulse.png relative to this YAML.
# - This project now uses the same centered PNG for two jobs:
#   1) idle clock face background
#   2) listening/responding pulse visual
# - A centered source image is more efficient than a full-screen PNG.
# - Recommended source size: 200x200.
image:
  - file: "assets/voice_pulse.png"
    id: voice_pulse_image
    type: RGB565
    transparency: alpha_channel
    resize: 200x200

display:
  - platform: ili9xxx
    id: box_display
    model: S3BOX
    spi_id: lcd_spi
    cs_pin: GPIO5
    dc_pin: GPIO4
    reset_pin:
      number: GPIO48
      inverted: true
    data_rate: 40MHz
    auto_clear_enabled: false
    update_interval: never

output:
  - platform: ledc
    id: lcd_backlight_pwm
    pin: GPIO47
    frequency: 2000Hz

light:
  - platform: monochromatic
    id: lcd_backlight
    internal: true
    restore_mode: ALWAYS_ON
    output: lcd_backlight_pwm
    default_transition_length: 0s

globals:
  - id: ui_phase
    type: int
    restore_value: no
    initial_value: '0'
  - id: pulse_zoom_native
    type: int
    restore_value: no
    initial_value: '256'
  - id: pulse_direction
    type: int
    restore_value: no
    initial_value: '1'
  - id: clock_center_x
    type: int
    restore_value: no
    initial_value: '100'
  - id: clock_center_y
    type: int
    restore_value: no
    initial_value: '100'

lvgl:
  widgets:
    - obj:
        id: root_bg
        x: 0
        y: 0
        width: 320
        height: 240
        radius: 0
        pad_all: 0
        border_opa: TRANSP
        bg_color: 0x000000
        bg_opa: COVER
        scrollbar_mode: "OFF"
        widgets:
          - image:
              id: clock_face_image
              align: CENTER
              src: voice_pulse_image
              hidden: false
              antialias: false
              mode: VIRTUAL
          - line:
              id: hour_hand
              hidden: false
              line_width: ${clock_hour_hand_width}
              line_color: 0xFFFFFF
              line_rounded: true
              points:
                - 100, 100
                - 100, 60
          - line:
              id: minute_hand
              hidden: false
              line_width: ${clock_minute_hand_width}
              line_color: 0xFFFFFF
              line_rounded: true
              points:
                - 100, 100
                - 100, 40
          - line:
              id: second_hand
              hidden: false
              line_width: ${clock_second_hand_width}
              line_color: 0xFFFFFF
              line_rounded: true
              points:
                - 100, 100
                - 100, 28
          - obj:
              id: clock_center_cap
              hidden: false
              align: CENTER
              width: 18
              height: 18
              radius: 9
              pad_all: 0
              border_width: 2
              border_color: 0x000000
              bg_color: 0xF8F8F8
              bg_opa: COVER
              scrollbar_mode: "OFF"
          - image:
              id: pulse_image
              align: CENTER
              src: voice_pulse_image
              hidden: true
              zoom: 256
              antialias: false
              mode: VIRTUAL

script:
  - id: update_clock_hands
    mode: restart
    then:
      - if:
          condition:
            lambda: "return id(ha_time).now().is_valid();"
          then:
            - lvgl.line.update:
                id: hour_hand
                points:
                  - x: !lambda "return id(clock_center_x);"
                    y: !lambda "return id(clock_center_y);"
                  - x: !lambda |-
                      auto now = id(ha_time).now();
                      const float hours = (now.hour % 12) + (now.minute / 60.0f);
                      const float angle = ((hours * 30.0f) - 90.0f) * 0.01745329252f;
                      return id(clock_center_x) + int(cosf(angle) * ${clock_hour_hand_length});
                    y: !lambda |-
                      auto now = id(ha_time).now();
                      const float hours = (now.hour % 12) + (now.minute / 60.0f);
                      const float angle = ((hours * 30.0f) - 90.0f) * 0.01745329252f;
                      return id(clock_center_y) + int(sinf(angle) * ${clock_hour_hand_length});
            - lvgl.line.update:
                id: minute_hand
                points:
                  - x: !lambda "return id(clock_center_x);"
                    y: !lambda "return id(clock_center_y);"
                  - x: !lambda |-
                      auto now = id(ha_time).now();
                      const float minutes = now.minute + (now.second / 60.0f);
                      const float angle = ((minutes * 6.0f) - 90.0f) * 0.01745329252f;
                      return id(clock_center_x) + int(cosf(angle) * ${clock_minute_hand_length});
                    y: !lambda |-
                      auto now = id(ha_time).now();
                      const float minutes = now.minute + (now.second / 60.0f);
                      const float angle = ((minutes * 6.0f) - 90.0f) * 0.01745329252f;
                      return id(clock_center_y) + int(sinf(angle) * ${clock_minute_hand_length});
            - lvgl.line.update:
                id: second_hand
                points:
                  - x: !lambda "return id(clock_center_x);"
                    y: !lambda "return id(clock_center_y);"
                  - x: !lambda |-
                      auto now = id(ha_time).now();
                      const float angle = ((now.second * 6.0f) - 90.0f) * 0.01745329252f;
                      return id(clock_center_x) + int(cosf(angle) * ${clock_second_hand_length});
                    y: !lambda |-
                      auto now = id(ha_time).now();
                      const float angle = ((now.second * 6.0f) - 90.0f) * 0.01745329252f;
                      return id(clock_center_y) + int(sinf(angle) * ${clock_second_hand_length});

  - id: ui_idle
    mode: restart
    then:
      - lambda: |-
          id(ui_phase) = 0;
          id(pulse_zoom_native) = 256;
          id(pulse_direction) = 1;
      - lvgl.widget.show: [clock_face_image, hour_hand, minute_hand, second_hand, clock_center_cap]
      - lvgl.widget.hide: pulse_image
      - script.execute: update_clock_hands

  - id: ui_listening
    mode: restart
    then:
      - lambda: |-
          id(ui_phase) = 1;
          id(pulse_zoom_native) = 256;
          id(pulse_direction) = 1;
      - lvgl.widget.hide: [clock_face_image, hour_hand, minute_hand, second_hand, clock_center_cap]
      - lvgl.widget.show: pulse_image
      - lvgl.image.update:
          id: pulse_image
          image_recolor: 0x41C7F4
          image_recolor_opa: 35%

  - id: ui_responding
    mode: restart
    then:
      - lambda: |-
          id(ui_phase) = 2;
          id(pulse_zoom_native) = 256;
          id(pulse_direction) = 1;
      - lvgl.widget.hide: [clock_face_image, hour_hand, minute_hand, second_hand, clock_center_cap]
      - lvgl.widget.show: pulse_image
      - lvgl.image.update:
          id: pulse_image
          image_recolor: 0xF4B942
          image_recolor_opa: 35%

  - id: ui_error
    mode: restart
    then:
      - lambda: |-
          id(ui_phase) = 3;
          id(pulse_zoom_native) = 256;
          id(pulse_direction) = 1;
      - lvgl.widget.hide: [clock_face_image, hour_hand, minute_hand, second_hand, clock_center_cap]
      - lvgl.widget.show: pulse_image
      - lvgl.image.update:
          id: pulse_image
          image_recolor: 0xD64545
          image_recolor_opa: 40%

  - id: arm_wake_word
    mode: restart
    then:
      - delay: 250ms
      - if:
          condition:
            and:
              - voice_assistant.connected:
              - switch.is_off: mute_switch
          then:
            - micro_wake_word.start:

interval:
  - interval: 90ms
    then:
      - if:
          condition:
            lambda: "return id(ui_phase) == 1 || id(ui_phase) == 2;"
          then:
            - lambda: |-
                const int min_zoom = (id(ui_phase) == 1) ? 236 : 246;
                const int max_zoom = (id(ui_phase) == 1) ? 300 : 286;
                id(pulse_zoom_native) += id(pulse_direction) * 6;
                if (id(pulse_zoom_native) >= max_zoom) {
                  id(pulse_zoom_native) = max_zoom;
                  id(pulse_direction) = -1;
                } else if (id(pulse_zoom_native) <= min_zoom) {
                  id(pulse_zoom_native) = min_zoom;
                  id(pulse_direction) = 1;
                }
            - lvgl.image.update:
                id: pulse_image
                zoom: !lambda "return id(pulse_zoom_native);"
          else:
            - if:
                condition:
                  lambda: "return id(pulse_zoom_native) != 256;"
                then:
                  - lambda: |-
                      id(pulse_zoom_native) = 256;
                      id(pulse_direction) = 1;
                  - lvgl.image.update:
                      id: pulse_image
                      zoom: 256

  - interval: 1s
    then:
      - if:
          condition:
            lambda: "return id(ui_phase) == 0;"
          then:
            - script.execute: update_clock_hands

# Preferred mode: on-device wake word. This is realistic on the BOX-3 if
# your ESPHome build and PSRAM configuration remain stable.
micro_wake_word:
  id: box_mww
  microphone: box_mic
  stop_after_detection: true
  vad:
    model: github://esphome/micro-wake-word-models/models/v2/vad.json
    probability_cutoff: 0.80
    sliding_window_size: 5
  models:
    - model: github://esphome/micro-wake-word-models/models/v2/okay_nabu.json
      probability_cutoff: 0.97
      sliding_window_size: 4
  on_wake_word_detected:
    then:
      - voice_assistant.start:
          wake_word: !lambda "return wake_word;"

voice_assistant:
  id: va
  microphone: box_mic
  speaker: box_speaker
  micro_wake_word: box_mww
  use_wake_word: false
  conversation_timeout: 20s
  noise_suppression_level: 1
  auto_gain: 0dBFS
  volume_multiplier: 1.0

  on_client_connected:
    then:
      - script.execute: ui_idle
      - script.execute: arm_wake_word

  on_client_disconnected:
    then:
      - micro_wake_word.stop:
      - script.execute: ui_idle

  on_listening:
    then:
      - script.execute: ui_listening

  on_stt_end:
    then:
      - script.execute: ui_responding

  on_tts_stream_start:
    then:
      - script.execute: ui_responding

  on_end:
    then:
      - wait_until:
          not:
            voice_assistant.is_running:
      - script.execute: ui_idle
      - script.execute: arm_wake_word

  on_idle:
    then:
      - script.execute: ui_idle

  on_error:
    then:
      - script.execute: ui_error
      - delay: 1200ms
      - script.execute: ui_idle
      - script.execute: arm_wake_word
